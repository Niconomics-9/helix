name: Deploy to HELIX Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Package to HELIX
        uses: hypersonic-laboratories/deploy-package@main
        with:
          access_token: ${{ secrets.ACCESS_TOKEN }}
          package_name: 'helix-project'

